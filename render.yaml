services:
  - type: web
    name: study-portal
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: MONGODB_URI
        sync: false # Set in Render Dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false # Set in Render Dashboard
      - key: ADMIN_PASSWORD
        sync: false # Set in Render Dashboard
