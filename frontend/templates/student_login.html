{% extends "base.html" %}

{% block title %}Student Login - SPPU IT Portal{% endblock %}

{% block content %}
<div class="container" style="min-height: 85vh; display: flex; align-items: center; justify-content: center; padding: 4rem 1.5rem;">
    <div class="card fade-in-up" style="max-width: 480px; width: 100%; padding: 3rem; box-shadow: 0 30px 60px rgba(0,0,0,0.6);">
        <div class="text-center mb-3">
            <div style="width: 80px; height: 80px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 1.5rem auto; box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);">🎓</div>
            <h1 class="card-title" style="font-size: 2rem; letter-spacing: -0.5px;">Welcome Back</h1>
            <p class="card-subtitle" style="font-size: 1rem; opacity: 0.8;">Sign in to access your curated IT study materials</p>
        </div>

        <form method="POST" class="mt-3">
            <div class="form-group mb-2">
                <label class="form-label" style="font-weight: 600; color: var(--text-primary);">Username</label>
                <input type="text" name="username" class="form-input" placeholder="Your student username" style="padding: 0.8rem 1rem;" required>
            </div>
            <div class="form-group mb-3">
                <label class="form-label" style="font-weight: 600; color: var(--text-primary);">Password</label>
                <input type="password" name="password" class="form-input" placeholder="••••••••" style="padding: 0.8rem 1rem;" required>
            </div>
            
            <button type="submit" class="btn btn-primary w-full" style="padding: 0.8rem; justify-content: center; font-size: 1.1rem; border-radius: 12px;">
                🚀 Sign In to Portal
            </button>
            <div class="text-center mt-3">
                <p style="font-size: 0.95rem; color: var(--text-muted);">
                    New to StudyPortal? <a href="/signup" style="color: var(--primary); text-decoration: none; font-weight: 700;">Create an account</a>
                </p>
            </div>
        </form>
    </div>
</div>
{% endblock %}
