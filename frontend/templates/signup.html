{% extends "base.html" %}

{% block title %}Sign Up - Join the IT Hub{% endblock %}

{% block content %}
<div class="container" style="min-height: 85vh; display: flex; align-items: center; justify-content: center; padding: 4rem 1.5rem;">
    <div class="card fade-in-up" style="max-width: 480px; width: 100%; padding: 3rem; box-shadow: 0 40px 80px rgba(0,0,0,0.6);">
        <div class="text-center mb-3">
            <div style="width: 80px; height: 80px; background: linear-gradient(135deg, var(--secondary), var(--accent)); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 1.5rem auto; box-shadow: 0 10px 25px rgba(20, 184, 166, 0.4);">✨</div>
            <h2 class="card-title" style="font-size: 2.2rem; margin-bottom: 0.5rem; letter-spacing: -0.5px;">Join StudyPortal</h2>
            <p class="card-subtitle" style="font-size: 1rem; opacity: 0.8;">Start your journey with structured SPPU IT resources</p>
        </div>

        <form method="POST" class="mt-3">
            <div class="form-group mb-2">
                <label class="form-label" style="font-weight: 600; color: var(--text-primary);">Username</label>
                <input type="text" name="username" class="form-input" placeholder="Choose a name (min 3 chars)" style="padding: 0.8rem 1rem;" required>
            </div>
            <div class="form-group mb-3">
                <label class="form-label" style="font-weight: 600; color: var(--text-primary);">Password</label>
                <input type="password" name="password" class="form-input" placeholder="Set a secure password (min 6 chars)" style="padding: 0.8rem 1rem;" required>
            </div>
            
            <button type="submit" class="btn btn-primary w-full" style="padding: 0.8rem; justify-content: center; font-size: 1.15rem; border-radius: 12px;">
                ✨ Create Free Account
            </button>
            <div class="text-center mt-3">
                <p style="font-size: 0.95rem; color: var(--text-muted);">
                    Already a member? <a href="/student/login" style="color: var(--primary); text-decoration: none; font-weight: 700;">Login here</a>
                </p>
            </div>
        </form>
    </div>
</div>
{% endblock %}
